# Self-contained local stack for the fake-IdP web app.
#
#   cp .env.example .env   # then paste your signing keypair into .env
#   docker compose up --build
#
# Host ports (defaults):  proxy -> 7001 (the app's single entry point), backend -> 7000
# (direct, for swagger/debug), frontend -> 7002.
#
# Browse the app at the PROXY (ADMIN_PORT). The nginx `proxy` service serves the admin
# UI and the backend API under ONE origin, so the admin->API calls are same-origin and
# the SAML session cookie is first-party — this is what fixes the cross-site-cookie 401.
# See nginx.conf. (ADMIN_PORT now publishes the proxy; the admin container is internal.)
#
# ENV: this file is the single source of truth for the Docker stack's config.
# Every runtime value is set inline below; the per-package .env.*.local files are
# ONLY used by `yarn dev` (dotenv), never by Docker. The one thing Docker reads
# from outside is the root .env, used purely for ${VAR} interpolation here.
#
# Domain + ports are configurable from .env and switch INDEPENDENTLY:
#   BASE_URL      protocol+host, no port, no trailing slash (default http://localhost)
#   BACKEND_PORT / ADMIN_PORT / FRONTEND_PORT   published host ports (7000/7001/7002)
# The browser-facing SP/IdP URLs and NEXT_PUBLIC_* build args are composed from
# BASE_URL + the relevant *_PORT below; containers always listen on 3000 internally.
#
# Only ONE self-signed keypair must be supplied via .env (SAML_IDP_PRIVATE_KEY +
# SAML_IDP_PUBLIC_CERT); the SP role reuses it. Everything else has dev defaults
# so the stack boots out of the box.

services:
  backend:
    build:
      context: ./backend
    image: fake-idp-backend
    ports:
      - "${BACKEND_PORT:-7000}:3000"
    volumes:
      - backend-data:/app/data
    environment:
      NODE_ENV: production
      PORT: "3000"
      BASE_URL_PREFIX: /api
      API_BASE_URL: https://api-test.sundsvall.se
      # Browser-facing origin. With the same-origin proxy, app traffic is same-origin
      # (CORS not exercised), but this whitelist still gates SAML RelayState validation
      # (isValidOrigin) — so it must contain the proxy origin. Override via ORIGIN in .env.
      ORIGIN: ${ORIGIN:-${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}}
      CREDENTIALS: "true"
      SWAGGER_ENABLED: "true"
      LOG_FORMAT: dev
      LOG_DIR: ../../data/logs
      SECRET_KEY: ${SECRET_KEY:-dev-secret-change-me}
      # WSO2 proxy creds — dummies are fine unless you exercise the upstream APIs.
      CLIENT_KEY: ${CLIENT_KEY:-dummy}
      CLIENT_SECRET: ${CLIENT_SECRET:-dummy}
      # SAML Service Provider role (consume). The SP points at our OWN IdP below,
      # so SAML_ENTRY_SSO + SAML_IDP_PUBLIC_CERT are the self-referential link.
      # All browser-facing SAML URLs use the PROXY origin (ADMIN_PORT) so the entire
      # login dance stays on one origin and the session cookie is first-party.
      SAML_CALLBACK_URL: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${PUBLIC_PREFIX:-}/api/saml/login/callback
      SAML_LOGOUT_CALLBACK_URL: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${PUBLIC_PREFIX:-}/api/saml/logout/callback
      SAML_FAILURE_REDIRECT: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${PUBLIC_PREFIX:-}/api/saml/login
      SAML_SUCCESS_REDIRECT: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${ADMIN_BASE_PATH:-}
      SAML_LOGOUT_REDIRECT: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${ADMIN_BASE_PATH:-}
      SAML_ISSUER: passport-saml
      # The SP signs its AuthnRequest with this keypair. Since the IdP below never
      # verifies the SP's request signature, the SP simply REUSES the single IdP
      # keypair from .env — so .env only ever holds one keypair, not two.
      SAML_PRIVATE_KEY: ${SAML_IDP_PRIVATE_KEY:?set SAML_IDP_PRIVATE_KEY in .env}
      SAML_PUBLIC_KEY: ${SAML_IDP_PUBLIC_CERT:?set SAML_IDP_PUBLIC_CERT in .env}
      # SAML Identity Provider role (issue). Self-referential: the SP above trusts
      # this IdP, signed with the one keypair you provide in .env.
      SAML_ENTRY_SSO: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${PUBLIC_PREFIX:-}/api/saml/idp/sso
      SAML_IDP_ENTITY_ID: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}${PUBLIC_PREFIX:-}/api/saml/idp/metadata
      SAML_SP_AUDIENCE: passport-saml
      SAML_IDP_ENUMERATE_USERS: "true"
      # Public sub-path prefix for the whole stack (admin + API + IdP). Empty =
      # default layout (admin at /, API at /api, IdP at /api/saml/idp). Set
      # PUBLIC_PREFIX=/idp2 (+ ADMIN_BASE_PATH=/idp2/admin) in .env to expose the IdP
      # at <host>/idp2/api/saml/idp/* — the backend then emits those URLs in login
      # forms + metadata, and is reachable at both the prefixed and unprefixed paths.
      SAML_IDP_BASE_PATH: ${PUBLIC_PREFIX:-}
      # The ONLY required secret — the self-signed signing keypair (see .env.example).
      SAML_IDP_PRIVATE_KEY: ${SAML_IDP_PRIVATE_KEY:?set SAML_IDP_PRIVATE_KEY in .env}
      SAML_IDP_PUBLIC_CERT: ${SAML_IDP_PUBLIC_CERT:?set SAML_IDP_PUBLIC_CERT in .env}

  admin:
    build:
      context: ./admin
      args:
        # Point the browser at the PROXY origin (same as where the admin page is
        # served), NOT the backend port — requests become same-origin /api/* calls.
        # Must stay ABSOLUTE: login.tsx does `new URL(apiURL('/saml/login'))`.
        NEXT_PUBLIC_API_URL: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}
        # API path carries the public prefix so admin -> API calls hit <origin>/idp2/api/*.
        NEXT_PUBLIC_API_PATH: ${PUBLIC_PREFIX:-}/api
        # Next.js basePath: serve the admin UI under ADMIN_BASE_PATH (e.g. /idp2/admin).
        # Empty = root. NOTE: basePath is INLINED at build time, so changing it needs
        # a rebuild (`docker compose up --build admin`).
        BASE_PATH: ${ADMIN_BASE_PATH:-}
        NEXT_PUBLIC_BASE_PATH: ${ADMIN_BASE_PATH:-}
        NEXT_PUBLIC_APP_NAME: Fake IdP Admin
        DOMAIN_NAME: localhost
        NEXT_PUBLIC_FEATURE_SHOW_USER_PASSWORDS: "false"
        HEALTH_AUTH: "false"
    image: fake-idp-admin
    # No published port: the admin is reached only through the proxy below.
    expose:
      - "3000"
    depends_on:
      - backend

  # Same-origin reverse proxy — the app's single entry point (see nginx.conf.template).
  # Routes the API to the backend and everything else to the admin UI, so the SAML
  # session cookie is first-party. This is what publishes ADMIN_PORT now. The config
  # is an envsubst template: PUBLIC_PREFIX/ADMIN_BASE_PATH are substituted at startup
  # (NGINX_ENVSUBST_FILTER keeps nginx's own $vars intact), so the same file serves
  # the default root layout and the prefixed (/idp2) layout.
  proxy:
    image: nginx:1.27-alpine
    ports:
      - "${ADMIN_PORT:-7001}:80"
    environment:
      PUBLIC_PREFIX: ${PUBLIC_PREFIX:-}
      ADMIN_BASE_PATH: ${ADMIN_BASE_PATH:-}
      NGINX_ENVSUBST_FILTER: "^(PUBLIC_PREFIX|ADMIN_BASE_PATH)$$"
    volumes:
      - ./nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
    depends_on:
      - admin
      - backend

  # frontend:
  #   build:
  #     context: ./frontend
  #     args:
  #       NEXT_PUBLIC_API_URL: ${BASE_URL:-http://localhost}:${BACKEND_PORT:-7000}/api
  #       NEXT_PUBLIC_APP_NAME: Fake IdP
  #       ADMIN_URL: ${BASE_URL:-http://localhost}:${ADMIN_PORT:-7001}/
  #       DOMAIN_NAME: localhost
  #       HEALTH_AUTH: "false"
  #   image: fake-idp-frontend
  #   ports:
  #     - "${FRONTEND_PORT:-7002}:3000"
  #   depends_on:
  #     - backend

volumes:
  backend-data:

# NOTE: the database lives on the named volume `backend-data` and PERSISTS across
# `up --build` / `down` (only `down -v` wipes it). It starts empty (migrations run
# at startup, but seeding is not wired into Docker) — populate it via the admin UI
# (the proxy on ADMIN_PORT, e.g. http://dev.test:7001), either by adding users by hand
# or with the "Import users" button on /users, which replaces all users from a users.js.
