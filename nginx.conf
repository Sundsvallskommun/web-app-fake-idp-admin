# Same-origin reverse proxy for the fake-IdP stack.
#
# Serves the admin UI and the backend API under ONE origin (the published admin
# host:port, e.g. http://dev.test:7001). That makes the admin -> API calls
# same-origin and the SAML session cookie first-party, which eliminates the
# cross-site-cookie 401: every Set-Cookie in the SAML redirect chain
# (admin -> SP -> IdP -> ACS callback -> admin) is stored and replayed reliably.
#
# Routing:
#   /api/health/up  -> admin   (the admin's own Next.js health route)
#   /api/*          -> backend  (REST API + SAML SP/IdP routes, all under /api)
#   /*              -> admin    (Next.js pages + /_next static assets)

server {
    listen 80;
    server_name _;

    # The users.js import POSTs the file as a JSON body; the backend raises its
    # own limit to 10mb, so the proxy must not reject it first (nginx default 1m).
    client_max_body_size 10m;

    # The admin app owns this one /api path (Next.js API route); keep it on admin.
    location = /api/health/up {
        proxy_pass http://admin:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Backend API + SAML SP/IdP routes (everything else under /api).
    location /api/ {
        proxy_pass http://backend:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Admin UI (Next.js standalone) — pages and static assets.
    location / {
        proxy_pass http://admin:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
